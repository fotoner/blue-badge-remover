<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../src/popup/style.css">
  <title>Blue Badge Remover</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <h1>Blue Badge Remover</h1>
        <span id="version" class="version"></span>
      </div>
    </header>

    <div id="update-banner" class="section update-banner" style="display:none;">
      <span data-i18n="updateBanner">새 버전으로 업데이트되었습니다!</span>
      <button type="button" id="update-dismiss" class="update-dismiss" data-i18n="dismiss">닫기</button>
    </div>

    <div class="section master-toggle">
      <label class="toggle-row">
        <span class="label-primary" data-i18n="filtering">필터링</span>
        <input type="checkbox" id="enabled" checked>
      </label>
    </div>

    <div class="section stats-row">
      <span id="today-stats" class="stats-text" data-i18n="todayHidden">오늘 0개 숨김</span>
      <button type="button" id="share-btn" class="btn-share" data-i18n="share">공유</button>
    </div>

    <div class="section">
      <button type="button" id="open-settings-btn" class="btn-settings" data-i18n="openSettings">설정 열기</button>
    </div>

    <div class="section footer">
      <p class="credit">made by <a href="https://x.com/fotoner_p" target="_blank" rel="noopener">@fotoner_p</a></p>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
